document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ass=\"num\" style=\"color:var(--red);\">§ 01<\u002Fdiv>\n      <div class=\"right\">\n        <h2>Performance<br>at <span style=\"color:var(--red);\">scale.<\u002Fspan><\u002Fh2>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"grid g2\" style=\"margin:0 var(--pad) 48px; gap:48px; align-items:start;\">\n      <div>\n        <p class=\"body-lg\" style=\"color:var(--muted-on-light);\">Logan is an ad tech company with a global footprint across Latin America, Europe, Africa, and the United States, focused on driving measurable business outcomes for brands through commerce and e-commerce media.<\u002Fp>\n        <p class=\"body-lg\" style=\"color:var(--muted-on-light); margin-top:18px;\">The company works with more than 1,200 brands, both directly and through their agencies, including leading players across retail, CPG, and a wide range of other categories. Logan is deeply integrated with the major advertising agency groups in the markets where it operates, positioning itself as a strategic partner rather than a standalone technology vendor.<\u002Fp>\n        <p class=\"body-lg\" style=\"color:var(--muted-on-light); margin-top:18px;\">At its core, Logan is built around performance and attribution. The company helps brands generate and measure results across the full consumer journey, with a strong focus on sales, store visits, and digital interactions across multiple markets — both online and offline environments, enabling a unified view of performance that connects media exposure to real-world outcomes.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"border-left:2px solid var(--black); padding-left:32px;\">\n        <span class=\"eyebrow\" style=\"color:var(--red);\">No DSP. No SSP.<\u002Fspan>\n        <p class=\"body-lg\" style=\"color:var(--black); margin-top:14px; font-weight:500;\">Logan operates as a backbone services provider for global companies, particularly in footfall attribution — supporting large-scale measurement frameworks, campaign attribution, performance analysis, and data-driven insights.<\u002Fp>\n        <p class=\"body\" style=\"color:var(--muted-on-light); margin-top:14px;\">Logan does not operate its own DSP or SSP. Instead, it integrates and commercializes third-party inventory and technologies, acting as a connective infrastructure layer — flexible, partner-driven, and deeply embedded in the evolving media and data landscape, with a clear focus on efficiency, transparency, and measurable impact.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"stats-row\" style=\"color:var(--black);\">\n      <div class=\"cell hot\">\n        <div class=\"n\">1,200+<\u002Fdiv>\n        <div class=\"l\">Brand clients<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"cell\">\n        <div class=\"n\">350+<\u002Fdiv>\n        <div class=\"l\">Agency partners<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"cell\">\n        <div class=\"n\">4<\u002Fdiv>\n        <div class=\"l\">Continents active<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"cell\">\n        <div class=\"n\">10+<\u002Fdiv>\n        <div class=\"l\">Years in market<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"grid g2\" style=\"margin:48px var(--pad) 0;\">\n      <div>\n        <h4 style=\"margin-bottom:12px;\">A partner, not a vendor.<\u002Fh4>\n        <p class=\"body\" style=\"color:var(--muted-on-light);\">Logan is deeply integrated with the major advertising agency groups in the markets where it operates — positioning the company as a strategic infrastructure partner rather than a standalone tech provider. Our commercial model is direct and in-market across every LATAM country.<\u002Fp>\n      <\u002Fdiv>\n      <div>\n        <h4 style=\"margin-bottom:12px;\">Performance + attribution at the core.<\u002Fh4>\n        <p class=\"body\" style=\"color:var(--muted-on-light);\">We help brands generate and measure results across the full consumer journey — sales, store visits, and digital interactions — connecting media exposure to real-world outcomes across multiple markets.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- =========================== 02 OUR STACK (black) =========================== -->\n  <section id=\"stack\" class=\"block black\">\n    <div class=\"eb-row\" style=\"color:rgba(255,255,255,.7);\"><span class=\"eyebrow\">02 / Core Capabilities<\u002Fspan><span class=\"bar\"><\u002Fspan><span class=\"eyebrow\" style=\"opacity:.55;\">Three products · One stack<\u002Fspan><\u002Fdiv>\n    <div class=\"sec-head\">\n      <div class=\"num\" style=\"color:var(--yellow);\">§ 02<\u002Fdiv>\n      <div class=\"right\">\n        <h2 style=\"color:#fff;\">Capabilities <span style=\"color:var(--yellow);\">core.<\u002Fspan><\u002Fh2>\n        <p class=\"body-lg\" style=\"color:var(--muted-on-dark); margin-top:24px;\">Logan operates as an adtech and martech platform — not a traditional agency. Our stack is built around three core products.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"stack-grid\">\n      <div class=\"stack hot\">\n        <div class=\"num\">Product / 01<\u002Fdiv>\n        <h3>Logan Ads<\u002Fh3>\n        <p class=\"desc\">Cross-channel programmatic platform with 150+ ad formats. Full campaign management from display and video to audio and gaming.<\u002Fp>\n        <div class=\"meta\"><span>Programmatic<\u002Fspan><span>150+ formats<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"stack\">\n        <div class=\"num\">Product / 02<\u002Fdiv>\n        <h3>Super Small Data<\u002Fh3>\n        <p class=\"desc\">First-party data engine and audience intelligence (DaaS). Proprietary segmentation and targeting layer — directly complementary to Criteo's commerce data.<\u002Fp>\n        <div class=\"meta\"><span>1P Data · DaaS<\u002Fspan><span>Cookieless<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"stack\">\n        <div class=\"num\">Product / 03<\u002Fdiv>\n        <h3>PMP<\u002Fh3>\n        <p class=\"desc\">Premium private marketplace focused on video, audio and gaming verticals. We have existing experience running retargeting and commerce-oriented campaigns — directly complementary to Criteo's offering.<\u002Fp>\n        <div class=\"meta\"><span>CTV · Audio · Gaming<\u002Fspan><span>Curated<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"pillrow\">\n      <span class=\"pill solid\">CPG / FMCG — Nestlé (JV, €2M/year), Coca-Cola<\u002Fspan>\n      <span class=\"pill\">Automotive — BMW<\u002Fspan>\n      <span class=\"pill\">Technology — Google, Amazon<\u002Fspan>\n      <span class=\"pill solid\">Retail and e-commerce<\u002Fspan>\n      <span class=\"pill solid\">Financial services<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- =========================== 03 NEITHER CAN DO THIS ALONE (yellow) =========================== -->\n  <section id=\"alone\" class=\"block yellow\">\n    <div class=\"eb-row\" style=\"color:var(--black);\"><span class=\"eyebrow\">03 / Commerce Media &amp; Attribution<\u002Fspan><span class=\"bar\"><\u002Fspan><span class=\"eyebrow\" style=\"opacity:.6;\">The differentiator<\u002Fspan><\u002Fdiv>\n    <div class=\"sec-head\">\n      <div class=\"num\">§ 03<\u002Fdiv>\n      <div class=\"right\">\n        <h2>What the partnership<br><span style=\"color:var(--red);\">unlocks.<\u002Fspan><\u002Fh2>\n        <p class=\"body-lg\" style=\"color:var(--black); opacity:.85; margin-top:24px;\">This is the most differentiated aspect of the Logan × Criteo proposition — and the one that sets it apart from any other partnership Criteo could pursue in LATAM.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"duo\">\n      <div class=\"side l\">\n        <h4>What Logan brings<\u002Fh4>\n        <ul>\n          <li><span class=\"k\">L/01<\u002Fspan><span><strong>Metamobility.<\u002Fstrong> Real-world location data that tracks users across their physical and digital daily life.<\u002Fspan><\u002Fli>\n          <li><span class=\"k\">L/02<\u002Fspan><span><strong>Super Small Data.<\u002Fstrong> Cookieless first-party audiences built from on and off-channel signals.<\u002Fspan><\u002Fli>\n          <li><span class=\"k\">L/03<\u002Fspan><span><strong>150+ ad formats.<\u002Fstrong> For activation across any digital environment.<\u002Fspan><\u002Fli>\n          <li><span class=\"k\">L/04<\u002Fspan><span><strong>PMP inventory.<\u002Fstrong> In-game, CTV and audio — premium environments for commerce contexts.<\u002Fspan><\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div class=\"side r\">\n        <h4 style=\"color:var(--yellow);\">What Criteo brings<\u002Fh4>\n        <ul>\n          <li><span class=\"k\" style=\"color:var(--yellow); opacity:.85;\">C/01<\u002Fspan><span><strong>700M+ daily active shoppers.<\u002Fstrong> With purchase intent signals.<\u002Fspan><\u002Fli>\n          <li><span class=\"k\" style=\"color:var(--yellow); opacity:.85;\">C/02<\u002Fspan><span><strong>4B+ SKUs.<\u002Fstrong> And real-time cart and transaction data.<\u002Fspan><\u002Fli>\n          <li><span class=\"k\" style=\"color:var(--yellow); opacity:.85;\">C/03<\u002Fspan><span><strong>Best-in-class retargeting engine.<\u002Fstrong> For commerce and retail.<\u002Fspan><\u002Fli>\n          <li><span class=\"k\" style=\"color:var(--yellow); opacity:.85;\">C/04<\u002Fspan><span><strong>Commerce Yield.<\u002Fstrong> For retail media monetisation.<\u002Fspan><\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"unlock\">\n      <div>\n        <span class=\"eyebrow\" style=\"color:var(--yellow);\">Full-funnel commerce attribution<\u002Fspan>\n        <h3 style=\"margin-top:14px;\">Online + <span class=\"acc\">offline.<\u002Fspan><\u002Fh3>\n      <\u002Fdiv>\n      <div class=\"body\">\n        <p>Logan's <strong>Metamobility<\u002Fstrong> tracks a user's physical movements and purchase behaviour in the real world. Criteo tracks that same user's online shopping behaviour, cart activity and transactions. Together, we can connect a digital ad impression to an in-store purchase — closing the attribution gap that most advertisers in LATAM still cannot solve.<\u002Fp>\n        <p>This means a CPG brand like <strong>Nestlé<\u002Fstrong> or <strong>Coca-Cola<\u002Fstrong> can run a programmatic campaign through Logan Ads, retarget high-intent shoppers via Criteo's commerce engine, and then measure whether those users actually walked into a store and bought the product — using Logan's real-world location data as the attribution layer.<\u002Fp>\n        <p>That is a proposition that no other partnership in LATAM can currently offer.<\u002Fp>\n        <div class=\"flow\">\n          <span class=\"flowchip\">Logan Ads · Impression<\u002Fspan>\n          <span class=\"flowarrow\">→<\u002Fspan>\n          <span class=\"flowchip\">Criteo · Retarget<\u002Fspan>\n          <span class=\"flowarrow\">→<\u002Fspan>\n          <span class=\"flowchip\">Cart &amp; Transaction<\u002Fspan>\n          <span class=\"flowarrow\">→<\u002Fspan>\n          <span class=\"flowchip on\">Store visit · Logan<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <h3 style=\"margin:64px var(--pad) 24px;\">Core verticals<\u002Fh3>\n    <div class=\"verts\">\n      <div class=\"vrow\">\n        <div class=\"idx\">V/01<\u002Fdiv>\n        <div class=\"name\">CPG / FMCG<\u002Fdiv>\n        <div class=\"why\">High purchase frequency, proven retargeting ROI. Criteo's commerce data + Logan's 1PD audiences = highly precise targeting for repeat purchase.<\u002Fdiv>\n        <div class=\"pres\">Nestlé · Coca-Cola active.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"vrow\">\n        <div class=\"idx\">V/02<\u002Fdiv>\n        <div class=\"name\">Retail &amp; E-commerce<\u002Fdiv>\n        <div class=\"why\">Core Criteo use case. LATAM e-commerce growing fast — most mid-large retailers are not yet using commerce media effectively.<\u002Fdiv>\n        <div class=\"pres\">Active across MX, CO, PE, CL.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"vrow\">\n        <div class=\"idx\">V/03<\u002Fdiv>\n        <div class=\"name\">Financial Services<\u002Fdiv>\n        <div class=\"why\">High-value conversions, intent-driven audience. Retargeting for financial products carries strong measurable ROI — a natural fit for the Criteo engine.<\u002Fdiv>\n        <div class=\"pres\">Growing segment across the region.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- =========================== 04 PROOF POINTS (bone) =========================== -->\n  <section id=\"proof\" class=\"block bone\">\n    <div class=\"eb-row\" style=\"color:var(--black);\"><span class=\"eyebrow\">04 / Case Studies<\u002Fspan><span class=\"bar\"><\u002Fspan><span class=\"eyebrow\" style=\"opacity:.6;\">Live proof<\u002Fspan><\u002Fdiv>\n    <div class=\"sec-head\">\n      <div class=\"num\" style=\"color:var(--red);\">§ 04<\u002Fdiv>\n      <div class=\"right\">\n        <h2>Track<br><span style=\"color:var(--red);\">record.<\u002Fspan><\u002Fh2>\n        <p class=\"body-lg\" style=\"color:var(--muted-on-light); margin-top:24px;\">Logan operates a direct commercial model with in-market teams across all LATAM countries. Our go-to-market combines two channels: direct brand relationships and agency partnerships.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"cases\">\n      <div class=\"case black\">\n        <div class=\"head\">Case / 01 · Nestlé · CPG / FMCG<\u002Fdiv>\n        <div class=\"num\">€2M<small>Joint Venture · Per year<\u002Fsmall><\u002Fdiv>\n        <p>Long-term JV with one of Criteo's strongest global verticals. The Nestlé JV is a live proof point of our ability to close and manage large enterprise accounts in CPG — with full-cycle execution across campaign strategy, buying, and attribution.<\u002Fp>\n        <div class=\"meta\" style=\"margin-top:auto; padding-top:16px; border-top:1px dashed currentColor; display:flex; justify-content:space-between; font-family:var(--mono); font-size:10.5px; letter-spacing:.14em; text-transform:uppercase; opacity:.7;\"><span>JV · CPG<\u002Fspan><span>LATAM · Full-Funnel<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"case red\">\n        <div class=\"head\">Case / 02 · Google &amp; Amazon · Tech<\u002Fdiv>\n        <div class=\"ttl\">Tier 1 · Direct Brand<\u002Fdiv>\n        <p>Active brand relationships with technology leaders — demonstrating Logan's capability to operate at the standards required by the most demanding global advertisers. A direct indicator of data, reporting, and compliance maturity.<\u002Fp>\n        <div class=\"meta\" style=\"margin-top:auto; padding-top:16px; border-top:1px dashed currentColor; display:flex; justify-content:space-between; font-family:var(--mono); font-size:10.5px; letter-spacing:.14em; text-transform:uppercase; opacity:.7;\"><span>Technology<\u002Fspan><span>Direct · Global<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"case blue\">\n        <div class=\"head\">Case / 03 · BMW · Automotive<\u002Fdiv>\n        <div class=\"ttl\">Multi-market · Enterprise<\u002Fdiv>\n        <p>Multi-market automotive campaigns combining brand and performance objectives — with real-world attribution via Metamobility to measure dealership visits as an outcome metric. Directly validates the Logan + Criteo attribution proposition.<\u002Fp>\n        <div class=\"meta\" style=\"margin-top:auto; padding-top:16px; border-top:1px dashed currentColor; display:flex; justify-content:space-between; font-family:var(--mono); font-size:10.5px; letter-spacing:.14em; text-transform:uppercase; opacity:.7;\"><span>Automotive<\u002Fspan><span>Attribution · Metamobility<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"countrow\" style=\"color:var(--black);\">\n      <div>\n        <div class=\"n\">1,200+<\u002Fdiv>\n        <div class=\"l\">Direct Brands · Active clients<\u002Fdiv>\n        <p>Established relationships with marketing and media decision-makers at enterprise level across all LATAM markets. Pipeline for Criteo is not zero — it starts from day one.<\u002Fp>\n      <\u002Fdiv>\n      <div>\n        <div class=\"n\">350+<\u002Fdiv>\n        <div class=\"l\">Agency Channel · Partners<\u002Fdiv>\n        <p>Two-channel approach maximizes reach and accelerates Criteo's business development. Our agency relationships are deeply integrated across all major LATAM holding groups. Teams handle full-cycle execution — strategy, setup, optimization and reporting.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- =========================== 05 MARKETS &amp; STRUCTURE (red) =========================== -->\n  <section id=\"markets\" class=\"block red\">\n    <div class=\"eb-row\" style=\"color:rgba(255,255,255,.85);\"><span class=\"eyebrow\">05 / Partnership Proposal<\u002Fspan><span class=\"bar\"><\u002Fspan><span class=\"eyebrow\" style=\"opacity:.7;\">Markets &amp; rollout<\u002Fspan><\u002Fdiv>\n    <div class=\"sec-head\">\n      <div class=\"num\" style=\"color:var(--yellow);\">§ 05<\u002Fdiv>\n      <div class=\"right\">\n        <h2 style=\"color:#fff;\">Partnership<br><span style=\"color:var(--yellow);\">proposal.<\u002Fspan><\u002Fh2>\n        <p class=\"body-lg\" style=\"color:#fff; opacity:.9; margin-top:24px;\">I'd prefer to build a bottoms-up revenue model together on a call, using Criteo's average revenue per advertiser and the addressable client base we can realistically activate per market. I can have a first estimate ready before we speak.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"mkt\">\n      <div class=\"mkt-head\">\n        <div>Market<\u002Fdiv>\n        <div>Logan presence &amp; rationale<\u002Fdiv>\n        <div>Score<\u002Fdiv>\n        <div style=\"text-align:right;\">Priority<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"mkt-row\">\n        <div class=\"country\">Mexico<\u002Fdiv>\n        <div class=\"why\">Largest e-commerce market in LATAM ex-BR. Strong CPG and retail client base. High e-commerce penetration = ideal Criteo environment.<\u002Fdiv>\n        <div class=\"stars\">★★★<\u002Fdiv>\n        <div class=\"pri high\">High<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"mkt-row\">\n        <div class=\"country\">Colombia<\u002Fdiv>\n        <div class=\"why\">Fast-growing digital ad market. Strong retail and financial services verticals. Good agency density.<\u002Fdiv>\n        <div class=\"stars\">★★★<\u002Fdiv>\n        <div class=\"pri high\">High<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"mkt-row\">\n        <div class=\"country\">Peru<\u002Fdiv>\n        <div class=\"why\">Growing e-commerce adoption. CPG and retail are the dominant categories. Good white space for Criteo.<\u002Fdiv>\n        <div class=\"stars\">★★★<\u002Fdiv>\n        <div class=\"pri high\">High<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"mkt-row\">\n        <div class=\"country\">Chile<\u002Fdiv>\n        <div class=\"why\">Highest digital maturity in the region. Sophisticated advertisers who are ready for commerce media.<\u002Fdiv>\n        <div class=\"stars\">★★★<\u002Fdiv>\n        <div class=\"pri high\">High<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"mkt-row\">\n        <div class=\"country\">Argentina + Rest of LATAM<\u002Fdiv>\n        <div class=\"why\">Present across all markets. Argentina noted by you as a strong starting point — we agree, solid local relationships there.<\u002Fdiv>\n        <div class=\"stars\">★★<\u002Fdiv>\n        <div class=\"pri med\">Medium<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <h3 style=\"margin:48px var(--pad) 18px; color:#fff;\">EU Strip — Spain · Portugal · Italy<\u002Fh3>\n    <p style=\"margin:0 var(--pad); color:#fff; opacity:.9; max-width:72ch; font-size:14.5px;\">The European footprint is relevant beyond just additional markets — it signals to Criteo that Logan operates under GDPR standards, has experience with regulated data environments, and can scale the partnership beyond LATAM if the initial pilot succeeds.<\u002Fp>\n\n    <div class=\"eu\">\n      <div class=\"e\">\n        <div class=\"c\">Spain<\u002Fdiv>\n        <div class=\"n\">HQ<\u002Fdiv>\n        <div class=\"d\">Headquarters for European operations in Madrid. Strong CPG and retail client base. GDPR-compliant data infrastructure already in place.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"e\">\n        <div class=\"c\">Portugal<\u002Fdiv>\n        <div class=\"n\">Active<\u002Fdiv>\n        <div class=\"d\">Active market. Natural bridge between European operations and Portuguese-speaking markets. Retail and CPG focus.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"e\">\n        <div class=\"c\">Italy<\u002Fdiv>\n        <div class=\"n\">Active<\u002Fdiv>\n        <div class=\"d\">Active market. Strong fashion, retail and CPG verticals. Growing e-commerce adoption = relevant Criteo environment.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"grid g2\" style=\"margin:32px var(--pad) 0;\">\n      <div style=\"border:1px solid rgba(255,255,255,.3); padding:24px;\">\n        <span class=\"eyebrow\" style=\"color:var(--yellow);\">Box 01 · Core Verticals for Criteo via Logan<\u002Fspan>\n        <h4 style=\"margin:14px 0 10px; color:#fff;\">Where the value compounds.<\u002Fh4>\n        <p class=\"body\" style=\"color:#fff; opacity:.9;\"><strong>CPG / FMCG<\u002Fstrong> — High purchase frequency, proven retargeting ROI. Criteo's commerce data + Logan's 1PD audiences = highly precise targeting for repeat purchase. Nestlé JV, Coca-Cola and others already active. <strong>Retail &amp; e-commerce<\u002Fstrong> — Core Criteo use case. LATAM e-commerce is growing fast and most mid-large retailers are not yet using commerce media effectively — that's the gap. Active relationships across MX, CO, PE, CL. <strong>Financial services<\u002Fstrong> — High-value conversions, intent-driven audience. Retargeting for financial products has strong measurable ROI — a natural fit. Growing segment across the region.<\u002Fp>\n        <p class=\"body\" style=\"color:#fff; opacity:.9; margin-top:14px;\"><em>Core assumption:<\u002Fem> the biggest addressable market sits with mid to large advertisers already investing in digital but not yet using commerce media. That's not a niche — it's the majority of the market in LATAM today.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"border:1px solid rgba(255,255,255,.3); padding:24px;\">\n        <span class=\"eyebrow\" style=\"color:var(--yellow);\">Box 02 · Why Logan, not other players<\u002Fspan>\n        <h4 style=\"margin:14px 0 10px; color:#fff;\">A data and attribution integration.<\u002Fh4>\n        <p class=\"body\" style=\"color:#fff; opacity:.9;\">Logan offers Criteo something other players in the region cannot: <strong>real-world attribution at scale through Metamobility<\u002Fstrong>. The partnership is not a reseller arrangement — it is a data and attribution integration that creates a differentiated proposition for LATAM advertisers. We bring existing, activated commercial relationships across CPG, retail, and financial services in every priority market — not a greenfield pipeline that still needs to be built.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- =========================== 06 HOW WE MOVE FORWARD (white) =========================== -->\n  <section id=\"forward\" class=\"block white\">\n    <div class=\"eb-row\" style=\"color:var(--black);\"><span class=\"eyebrow\">06 / Next Steps<\u002Fspan><span class=\"bar\"><\u002Fspan><span class=\"eyebrow\" style=\"opacity:.6;\">Working sequence<\u002Fspan><\u002Fdiv>\n    <div class=\"sec-head\">\n      <div class=\"num\" style=\"color:var(--red);\">§ 06<\u002Fdiv>\n      <div class=\"right\">\n        <h2>Next<br><span style=\"color:var(--red);\">steps.<\u002Fspan><\u002Fh2>\n        <p class=\"body-lg\" style=\"color:var(--muted-on-light); margin-top:24px;\">A structured sequence into a working partnership — alignment, model, and proposal. The window to move in LATAM is now.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"moves\">\n      <div class=\"move black\">\n        <div class=\"step\">Step / 01<\u002Fdiv>\n        <h4>Alignment call.<\u002Fh4>\n        <p>Walk through this overview together. Align on which markets and verticals Criteo wants to prioritize first, and identify any technical or commercial requirements before moving to proposal stage.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"move yellow\">\n        <div class=\"step\">Step / 02<\u002Fdiv>\n        <h4>Revenue model by market.<\u002Fh4>\n        <p>Build a bottoms-up revenue model using Criteo's average revenue per advertiser and the addressable client base Logan can activate per market. Logan can have a first estimate ready before the call.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"move bone\">\n        <div class=\"step\">Step / 03<\u002Fdiv>\n        <h4>Go-to-market proposal.<\u002Fh4>\n        <p>Once we align on structure, Logan delivers a detailed GTM proposal with activation timeline, account targets, commercial model, and attribution integration approach. Pilot market: Argentina or Mexico.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"cta\">\n      <span class=\"eyebrow\">CTA<\u002Fspan>\n      <h2>Let's build this<br>together.<\u002Fh2>\n      <p style=\"margin:24px auto 0; max-width:54ch; color:rgba(255,255,255,.78); font-size:15px; line-height:1.6;\">Happy to jump on a call to walk you through this and start working on a revenue model by market. I can also build out a more detailed go-to-market proposal once we align on the structure that makes sense for Criteo.<\u002Fp>\n      <a class=\"btn\" href=\"mailto:manuel@logan.ai\">Manuel Tomé · Partner, Logan.ai<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <footer>\n    <span>Logan.ai — Confidential<\u002Fspan>\n    <span>Partnership Overview · LATAM ex-Brazil · April 2026<\u002Fspan>\n    <span>Prepared by Manuel Tomé<\u002Fspan>\n  <\u002Ffooter>\n\n<\u002Fmain>\n\n<script>\n  // active nav highlight\n  const links = document.querySelectorAll('.nav-links a');\n  const sections = [...links].map(a=>document.querySelector(a.getAttribute('href'))).filter(Boolean);\n  const io = new IntersectionObserver((entries)=>{\n    entries.forEach(e=>{\n      if(e.isIntersecting){\n        links.forEach(a=>a.classList.toggle('on', a.getAttribute('href')==='#'+e.target.id));\n      }\n    });\n  }, {rootMargin:'-45% 0px -50% 0px'});\n  sections.forEach(s=>io.observe(s));\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
